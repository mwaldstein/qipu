name: test_setup_commands
description: "Test setup command execution and recording"
tier: 0
template_folder: qipu
tags: [setup, smoke]
target:
  binary: qipu
task:
  prompt: "Initialize qipu if needed. Create one note titled 'Setup Commands Note' that says the setup command test ran."
evaluation:
  gates:
    - type: command_output_contains
      command: qipu search "Setup Commands Note" --format records
      substring: "Setup Commands Note"
    - type: no_transcript_errors
setup:
  commands:
    - "echo 'Setting up test environment'"
    - "pwd"
    - "ls -la"
