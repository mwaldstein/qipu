name: link_navigation
description: "Link navigation scenario"
template_folder: qipu
tier: 1
tags: [links, graph]
target:
  binary: qipu
  env:
    QIPU_STORE: "${LLM_TOOL_TEST_FIXTURE_DIR}/.qipu"
task:
  prompt: "In the current directory, initialize qipu if needed. Create two notes: one titled 'Cats' and one titled 'Dogs'. Link 'Cats' to 'Dogs' with type 'related'. Then verify the link with qipu link list."
evaluation:
  gates:
    - type: script
      description: "Cats and Dogs exist and are connected by a related link"
      command: |
        set -e
        cats_id=$(qipu search Cats --format records | awk '/^N / {print $2; exit}')
        dogs_id=$(qipu search Dogs --format records | awk '/^N / {print $2; exit}')
        test -n "$cats_id"
        test -n "$dogs_id"
        qipu link list "$cats_id" --format records | grep -q "E $cats_id related $dogs_id"
        qipu link path "$cats_id" "$dogs_id" --format records | grep -q "related"
  judge:
    enabled: true
    rubric: rubrics/link_v1.yaml
    pass_threshold: 0.7
