name: setup_test
description: "Test scenario with setup steps"
template_folder: qipu
tier: 1
tags: [setup, smoke]
target:
  binary: qipu
  env:
    QIPU_STORE: "${LLM_TOOL_TEST_FIXTURE_DIR}/.qipu"
task:
  prompt: "In the current directory, initialize qipu if needed. Create a new note titled 'Setup Test Note' about testing."
setup:
  commands:
    - "echo Running setup for test scenario"
evaluation:
  gates:
    - type: command_output_contains
      command: qipu search "Setup Test Note" --format records
      substring: "Setup Test Note"
