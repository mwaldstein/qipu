name: create_smoke
description: "Tier 0 smoke test: single note creation"
template_folder: qipu
tier: 0
tags: [capture, smoke]
target:
  binary: qipu
  env:
    QIPU_STORE: "${LLM_TOOL_TEST_FIXTURE_DIR}/.qipu"
task:
  prompt: "In the current directory, initialize qipu if needed. Create a note with the title 'Test Note' and content 'This is a test note for smoke testing.' Then verify you can find it."
evaluation:
  gates:
    - type: command_output_contains
      command: qipu search "Test Note" --format records
      substring: "Test Note"
    - type: script
      description: "The store contains exactly one note with the requested body"
      command: |
        set -e
        count=$(qipu list --format records | grep -c '^N ')
        test "$count" -eq 1
        qipu search "smoke testing" --format records | grep -q "Test Note"
